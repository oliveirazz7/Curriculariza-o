<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculariza-o</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div id="inicio" class="tela ativa">
            <h1>🎉 Curriculariza-o 🎉</h1>
            <p>
                Aprenda brincando sobre a cidade de Brusque!
            </p>
            <button onclick="iniciarJogo()">Começar Jogo</button>
        </div>

        <div id="quiz" class="tela">
            <h2 id="pergunta"></h2>

            <div id="respostas"></div>

            <p id="contador"></p>
        </div>

        <div id="final" class="tela">
            <h1>🏆 Fim do Jogo!</h1>
            <h2 id="pontuacaoFinal"></h2>
            <button onclick="reiniciarJogo()">Jogar Novamente</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
